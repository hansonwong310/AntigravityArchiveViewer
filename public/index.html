<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antigravity ArchiveViewer</title>
  
  <!-- 加载第三方组件 CDN -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="app.css">
  
  <!-- React & Babel Standalone -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Markdown & Mermaid 解析器 -->
  <script src="https://unpkg.com/marked@4.3.0/marked.min.js"></script>
  <script src="https://unpkg.com/mermaid@10.2.0/dist/mermaid.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- React APP 逻辑 -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 初始化 Mermaid
    try {
      mermaid.initialize({
        startOnLoad: false,
        theme: 'dark',
        securityLevel: 'loose',
        logLevel: 'error'
      });
    } catch (e) {
      console.error("Mermaid 初始化失败", e);
    }

    // ================= SVG 图标组件 =================
    const SunIcon = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
    );

    const MoonIcon = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    );

    const SearchIcon = () => (
      <svg className="search-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    );

    const TerminalIcon = () => (
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{marginRight: '6px'}}><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
    );

    const ArrowRightIcon = () => (
      <svg className="tool-drawer-arrow" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
    );

    const RefreshIcon = ({ isSpinning }) => (
      <svg className={isSpinning ? "spin" : ""} width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{transition: 'transform 0.5s ease'}}><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
    );

    // ================= Markdown 与 Mermaid 动态渲染组件 =================
    const MarkdownRenderer = ({ content, theme }) => {
      const containerRef = useRef(null);

      // 用 marked 解析 Markdown
      const htmlContent = (() => {
        try {
          return marked.parse(content || '');
        } catch (e) {
          return content;
        }
      })();

      // 动态触发 Mermaid 渲染
      useEffect(() => {
        if (containerRef.current) {
          // 查找所有代码块是 mermaid 的元素，并赋予 mermaid 类
          const codeBlocks = containerRef.current.querySelectorAll('pre code.language-mermaid');
          codeBlocks.forEach((codeEl, i) => {
            const preEl = codeEl.parentElement;
            const diagramText = codeEl.textContent;
            
            // 创建一个新的绘图容器
            const div = document.createElement('div');
            div.className = 'mermaid';
            div.setAttribute('id', `mermaid-diagram-${Date.now()}-${i}`);
            div.textContent = diagramText;
            
            preEl.replaceWith(div);
          });

          // 运行 Mermaid
          setTimeout(() => {
            try {
              if (window.mermaid) {
                // 根据当前主题动态调整 Mermaid 样式主题
                window.mermaid.initialize({
                  theme: theme === 'dark' ? 'dark' : 'default'
                });
                window.mermaid.run();
              }
            } catch (e) {
              console.warn("Mermaid 渲染错误: ", e);
            }
          }, 100);
        }
      }, [content, theme]);

      return (
        <div 
          ref={containerRef} 
          className="markdown-body" 
          dangerouslySetInnerHTML={{ __html: htmlContent }} 
        />
      );
    };

    // ================= 智能长文本可视折叠组件 =================
    const CollapsibleText = ({ children }) => {
      const [isExpanded, setIsExpanded] = useState(false);
      const [isOverflowing, setIsOverflowing] = useState(false);
      const containerRef = useRef(null);

      // 内容渲染后测量高度
      useEffect(() => {
        const checkHeight = () => {
          if (containerRef.current) {
            // 如果滚动高度大于 260px，说明超出限高，需要折叠
            setIsOverflowing(containerRef.current.scrollHeight > 260);
          }
        };

        // 稍微延时以确保 markdown 和代码高亮已渲染完毕
        const timer = setTimeout(checkHeight, 150);
        return () => clearTimeout(timer);
      }, [children]);

      return (
        <div className="collapsible-wrapper">
          <div 
            ref={containerRef}
            className={`collapsible-text-container ${isExpanded ? 'expanded' : ''}`}
            style={(!isExpanded && isOverflowing) ? { maxHeight: '250px' } : { maxHeight: 'none' }}
          >
            {children}
            {!isExpanded && isOverflowing && <div className="collapsible-text-overlay" />}
          </div>
          {isOverflowing && (
            <button 
              className="toggle-expand-btn" 
              onClick={() => setIsExpanded(!isExpanded)}
            >
              {isExpanded ? '⬆️ 收起长文本' : '⬇️ 展开余下全文'}
            </button>
          )}
        </div>
      );
    };

    // ================= 可折叠工具调用组件 (Console Drawer) =================
    const ToolCallDrawer = ({ toolCall }) => {
      const [isOpen, setIsOpen] = useState(false);

      const renderToolArgs = (args) => {
        if (!args) return null;
        try {
          const parsed = typeof args === 'string' ? JSON.parse(args) : args;
          return JSON.stringify(parsed, null, 2);
        } catch (e) {
          return args.toString();
        }
      };

      return (
        <div className={`tool-drawer ${isOpen ? 'open' : ''}`}>
          <div className="tool-drawer-header" onClick={() => setIsOpen(!isOpen)}>
            <div className="tool-drawer-title">
              <TerminalIcon />
              <span>工具调用:</span>
              <span className="tool-badge">{toolCall.name}</span>
            </div>
            <ArrowRightIcon />
          </div>
          {isOpen && (
            <div className="tool-drawer-content">
              {toolCall.arguments && (
                <div>
                  <div className="tool-code-title">输入参数:</div>
                  <pre className="tool-code-block"><code>{renderToolArgs(toolCall.arguments)}</code></pre>
                </div>
              )}
              {toolCall.output && (
                <div>
                  <div className="tool-code-title">执行输出 (Console Return):</div>
                  <pre className="tool-output-block"><code>{toolCall.output}</code></pre>
                </div>
              )}
            </div>
          )}
        </div>
      );
    };

    // ================= 智能日历小组件 =================
    const CalendarWidget = ({ calendarStats, selectedDate, onSelectDate }) => {
      const [currentDate, setCurrentDate] = useState(new Date());
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      // 获取当月天数及第一天是星期几
      const firstDayIndex = new Date(year, month, 1).getDay();
      const totalDays = new Date(year, month + 1, 0).getDate();

      // 上个月的总天数
      const prevMonthTotalDays = new Date(year, month, 0).getDate();

      // 计算日历网格数组 (包含上月和下月的补位天数，确保完整对齐周)
      const calendarDays = [];

      // 上月补位
      for (let i = firstDayIndex - 1; i >= 0; i--) {
        calendarDays.push({
          dayNum: prevMonthTotalDays - i,
          isCurrentMonth: false,
          dateStr: null
        });
      }

      // 当月天数
      for (let d = 1; d <= totalDays; d++) {
        const mm = String(month + 1).padStart(2, '0');
        const dd = String(d).padStart(2, '0');
        const dateStr = `${year}-${mm}-${dd}`;
        calendarDays.push({
          dayNum: d,
          isCurrentMonth: true,
          dateStr
        });
      }

      // 下月补位 (补满至7的倍数)
      const totalCells = Math.ceil(calendarDays.length / 7) * 7;
      const nextMonth补位Days = totalCells - calendarDays.length;
      for (let d = 1; d <= nextMonth补位Days; d++) {
        calendarDays.push({
          dayNum: d,
          isCurrentMonth: false,
          dateStr: null
        });
      }

      // 切换月份
      const prevMonth = () => setCurrentDate(new Date(year, month - 1, 1));
      const nextMonth = () => setCurrentDate(new Date(year, month + 1, 1));

      // 渲染每日的圆点强度 (3星指标)
      const renderTurnDots = (dateStr) => {
        if (!dateStr || !calendarStats[dateStr]) return null;
        
        const turns = calendarStats[dateStr].turns || 0;
        
        // 强度转换 (3星等级系统)
        let solidCount = 0;
        if (turns >= 13) {
          solidCount = 3;
        } else if (turns >= 5) {
          solidCount = 2;
        } else if (turns >= 1) {
          solidCount = 1;
        }

        const hollowCount = 3 - solidCount;
        const dots = [];

        // 渲染实心点
        for (let i = 0; i < solidCount; i++) {
          dots.push(<span key={`s-${i}`} className="calendar-dot solid" />);
        }
        // 渲染空心点
        for (let i = 0; i < hollowCount; i++) {
          dots.push(<span key={`h-${i}`} className="calendar-dot hollow" />);
        }

        return <div className="calendar-dots">{dots}</div>;
      };

      const monthNames = ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"];
      const weekdays = ["日", "一", "二", "三", "四", "五", "六"];

      return (
        <div className="calendar-section">
          <div className="calendar-header">
            <span className="calendar-month-year">{year}年 {monthNames[month]}</span>
            <div className="calendar-nav">
              <button className="calendar-nav-btn" onClick={prevMonth}>&lt;</button>
              <button className="calendar-nav-btn" onClick={nextMonth}>&gt;</button>
            </div>
          </div>
          
          <div className="calendar-grid">
            {weekdays.map(d => (
              <div key={d} className="calendar-weekday">{d}</div>
            ))}
            
            {calendarDays.map((cell, idx) => {
              const isSelected = selectedDate === cell.dateStr;
              const hasData = cell.dateStr && calendarStats[cell.dateStr];
              
              // 今天标识
              const todayObj = new Date();
              const isToday = cell.isCurrentMonth && 
                todayObj.getFullYear() === year && 
                todayObj.getMonth() === month && 
                todayObj.getDate() === cell.dayNum;

              return (
                <div
                  key={idx}
                  className={`calendar-day-cell ${!cell.isCurrentMonth ? 'inactive' : ''} ${isSelected ? 'selected' : ''} ${isToday ? 'today' : ''}`}
                  onClick={() => cell.dateStr && onSelectDate(cell.dateStr)}
                  title={hasData ? `对话轮次: ${calendarStats[cell.dateStr].turns} 轮` : ''}
                >
                  <span>{cell.dayNum}</span>
                  {cell.isCurrentMonth && renderTurnDots(cell.dateStr)}
                </div>
              );
            })}
          </div>
          
          {selectedDate && (
            <button className="clear-filter-btn" onClick={() => onSelectDate(null)}>
              🧹 清除日期过滤
            </button>
          )}
        </div>
      );
    };

    // ================= 主应用 =================
    const App = () => {
      const [theme, setTheme] = useState('dark');
      const [conversations, setConversations] = useState([]);
      const [selectedConvoId, setSelectedConvoId] = useState(null);
      const [convoDetails, setConvoDetails] = useState([]);
      const [calendarStats, setCalendarStats] = useState({});
      
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedDate, setSelectedDate] = useState(null);
      
      const [isGlobalSearching, setIsGlobalSearching] = useState(false);
      const [searchResults, setSearchResults] = useState([]);
      const [globalSearchQuery, setGlobalSearchQuery] = useState('');
      
      const [loadingDetails, setLoadingDetails] = useState(false);

      // ================= 全局搜索条目定位状态 =================
      const [highlightedStepIndex, setHighlightedStepIndex] = useState(null);

      // ================= 手动/自动同步刷新状态 =================
      const [isRefreshing, setIsRefreshing] = useState(false);
      const [refreshInterval, setRefreshInterval] = useState(0); // 0 = 手动, >0 = 自动秒数
      const timerRef = useRef(null);

      // ================= 左右拖拽状态 =================
      const [sidebarWidth, setSidebarWidth] = useState(285); // 窄一些的默认宽度
      const isResizing = useRef(false);

      const handleMouseDown = (e) => {
        isResizing.current = true;
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
      };

      useEffect(() => {
        const handleMouseMove = (e) => {
          if (!isResizing.current) return;
          const newWidth = e.clientX;
          // 限制宽度在 230px 到 480px 之间，更加收放自如
          if (newWidth > 230 && newWidth < 480) {
            setSidebarWidth(newWidth);
          }
        };

        const handleMouseUp = () => {
          if (isResizing.current) {
            isResizing.current = false;
            document.body.style.cursor = 'default';
            document.body.style.userSelect = 'auto';
          }
        };

        window.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('mouseup', handleMouseUp);
        return () => {
          window.removeEventListener('mousemove', handleMouseMove);
          window.removeEventListener('mouseup', handleMouseUp);
        };
      }, []);

      // 1. 同步加载对话列表和日历统计
      useEffect(() => {
        fetchData();
      }, []);

      const fetchData = async (showSpin = false) => {
        if (showSpin) setIsRefreshing(true);
        try {
          await Promise.all([
            fetchConversations(),
            fetchCalendarStats()
          ]);
          
          // 如果当前有选中的对话，顺便拉取一下最新对话步数
          if (selectedConvoId) {
            const res = await fetch(`/api/conversations/${selectedConvoId}`);
            const data = await res.json();
            setConvoDetails(data);
          }
        } catch (e) {
          console.error("同步数据失败", e);
        } finally {
          if (showSpin) {
            setTimeout(() => setIsRefreshing(false), 500); // 丝滑动画延时
          }
        }
      };

      const fetchConversations = async () => {
        const res = await fetch('/api/conversations');
        const data = await res.json();
        setConversations(data);
      };

      const fetchCalendarStats = async () => {
        const res = await fetch('/api/calendar-stats');
        const data = await res.json();
        setCalendarStats(data);
      };

      // ================= 2. 自动定时刷新机制 =================
      useEffect(() => {
        // 清理旧的定时器
        if (timerRef.current) {
          clearInterval(timerRef.current);
          timerRef.current = null;
        }

        // 如果设置了自动刷新频率，建立定时器
        if (refreshInterval > 0) {
          timerRef.current = setInterval(() => {
            fetchData(true);
          }, refreshInterval * 1000);
        }

        return () => {
          if (timerRef.current) {
            clearInterval(timerRef.current);
          }
        };
      }, [refreshInterval, selectedConvoId]);

      // 3. 切换当前选择的对话，流式加载详情
      useEffect(() => {
        if (!selectedConvoId) {
          setConvoDetails([]);
          return;
        }
        
        const fetchDetails = async () => {
          setLoadingDetails(true);
          try {
            const res = await fetch(`/api/conversations/${selectedConvoId}`);
            const data = await res.json();
            setConvoDetails(data);
          } catch (e) {
            console.error("加载详情失败", e);
          } finally {
            setLoadingDetails(false);
          }
        };

        fetchDetails();
      }, [selectedConvoId]);

      // 4. 全局搜索 API 调用
      useEffect(() => {
        if (!globalSearchQuery) {
          setSearchResults([]);
          return;
        }

        const delayDebounce = setTimeout(async () => {
          try {
            const res = await fetch(`/api/search?q=${encodeURIComponent(globalSearchQuery)}`);
            const data = await res.json();
            setSearchResults(data);
          } catch (e) {
            console.error("全局搜索失败", e);
          }
        }, 300);

        return () => clearTimeout(delayDebounce);
      }, [globalSearchQuery]);

      // ================= 5. 全局搜索条目平滑滚动定位与脉冲闪烁效果 =================
      useEffect(() => {
        if (!loadingDetails && convoDetails.length > 0 && highlightedStepIndex !== null) {
          const timer = setTimeout(() => {
            const element = document.getElementById(`step-card-${highlightedStepIndex}`);
            if (element) {
              // 平滑滚动居中对齐
              element.scrollIntoView({ behavior: 'smooth', block: 'center' });
              
              // 叠加高亮脉冲动画
              element.classList.add('pulse-highlight');
              setTimeout(() => {
                element.classList.remove('pulse-highlight');
              }, 2500);
            }
            // 定位完成后，重置定位状态，避免切换对话时引起意外滚动
            setHighlightedStepIndex(null);
          }, 350); // 延时以等待 DOM 彻底回显
          return () => clearTimeout(timer);
        }
      }, [loadingDetails, convoDetails, highlightedStepIndex]);

      // 切换主题
      const toggleTheme = () => {
        const nextTheme = theme === 'dark' ? 'light' : 'dark';
        setTheme(nextTheme);
        document.documentElement.className = `theme-${nextTheme}`;
      };

      // 日期过滤锁定
      const handleSelectDate = (dateStr) => {
        setSelectedDate(dateStr);
        // 如果有选中的对话，且日期不对齐，先清空选中
        if (dateStr) {
          if (selectedConvoId) {
            const activeConvo = conversations.find(c => c.id === selectedConvoId);
            if (activeConvo && activeConvo.date !== dateStr) {
              setSelectedConvoId(null);
            }
          }
        }
      };

      // 过滤展示卡片
      const filteredConversations = conversations.filter(c => {
        const matchSearch = c.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                            c.id.toLowerCase().includes(searchQuery.toLowerCase());
        const matchDate = selectedDate ? c.date === selectedDate : true;
        return matchSearch && matchDate;
      });

      // 找到当前选中的对话元数据
      const activeConvoMeta = conversations.find(c => c.id === selectedConvoId);

      return (
        <div className="app-container">
          
          {/* ================= 左侧边栏 (支持动态宽) ================= */}
          <div className="sidebar" style={{ width: `${sidebarWidth}px` }}>
            <div className="sidebar-header">
              <h1 className="brand-title">
                🔮 Antigravity AV
              </h1>
              
              <div style={{display: 'flex', gap: '8px', alignItems: 'center'}}>
                {/* 手动同步刷新按钮 */}
                <button 
                  className="theme-toggle-btn" 
                  onClick={() => fetchData(true)} 
                  title="手动刷新数据"
                  disabled={isRefreshing}
                >
                  <RefreshIcon isSpinning={isRefreshing} />
                </button>
                
                {/* 切换主题按钮 */}
                <button className="theme-toggle-btn" onClick={toggleTheme} title="切换主题">
                  {theme === 'dark' ? <SunIcon /> : <MoonIcon />}
                </button>
              </div>
            </div>

            {/* 3星日历组件 */}
            <CalendarWidget 
              calendarStats={calendarStats}
              selectedDate={selectedDate}
              onSelectDate={handleSelectDate}
            />

            {/* 搜索栏与刷新频率设置 */}
            <div className="search-section" style={{display: 'flex', flexDirection: 'column', gap: '8px'}}>
              <div className="search-input-wrapper">
                <SearchIcon />
                <input
                  type="text"
                  className="search-input"
                  placeholder="搜索本地存档..."
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                />
              </div>
              
              {/* 刷新率选择下拉菜单 */}
              <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: '0.7rem', color: 'var(--text-muted)'}}>
                <span style={{display: 'flex', alignItems: 'center', gap: '4px'}}>
                  ⏱️ 自动刷新:
                  {refreshInterval > 0 && (
                    <span style={{width: '6px', height: '6px', borderRadius: '50%', background: '#22c55e', display: 'inline-block', animation: 'pulse 1.5s infinite'}}></span>
                  )}
                </span>
                <select 
                  value={refreshInterval} 
                  onChange={(e) => setRefreshInterval(Number(e.target.value))}
                  style={{
                    background: 'var(--bg-tertiary)',
                    border: '1px solid var(--border-color)',
                    color: 'var(--text-secondary)',
                    borderRadius: '4px',
                    padding: '2px 4px',
                    fontSize: '0.7rem',
                    outline: 'none'
                  }}
                >
                  <option value={0}>手动刷新</option>
                  <option value={5}>每 5 秒</option>
                  <option value={15}>每 15 秒</option>
                  <option value={30}>每 30 秒</option>
                  <option value={60}>每 60 秒</option>
                </select>
              </div>
            </div>

            {/* 对话列表 */}
            <div className="convo-list-section">
              {filteredConversations.length === 0 ? (
                <div style={{textAlign: 'center', color: 'var(--text-muted)', fontSize: '0.8rem', marginTop: '20px'}}>
                  没有找到符合条件的对话
                </div>
              ) : (
                filteredConversations.map(c => (
                  <div
                    key={c.id}
                    className={`convo-card ${selectedConvoId === c.id ? 'active' : ''}`}
                    onClick={() => {
                      setIsGlobalSearching(false);
                      setSelectedConvoId(c.id);
                    }}
                  >
                    <div className="convo-card-header">
                      <h3 className="convo-card-title">{c.title}</h3>
                      <span className="convo-card-turns">{c.turns} 轮</span>
                    </div>
                    <div className="convo-card-footer">
                      <span>📆 {c.date}</span>
                      <span>⏱️ {new Date(c.updatedAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                    </div>
                  </div>
                ))
              )}
            </div>
          </div>

          {/* ================= 左右拉伸指示条 ================= */}
          <div className="resizer" onMouseDown={handleMouseDown}></div>

          {/* ================= 右侧详情主面板 ================= */}
          <div className="main-content">
            
            {/* Header */}
            <header className="main-header">
              <div className="active-convo-info">
                {isGlobalSearching ? (
                  <h2 className="active-convo-title">🔍 全局全文搜索检索中</h2>
                ) : activeConvoMeta ? (
                  <>
                    <h2 className="active-convo-title">{activeConvoMeta.title}</h2>
                    <span className="active-convo-meta">
                      对话 ID: {activeConvoMeta.id} | 更新于 {new Date(activeConvoMeta.updatedAt).toLocaleString()}
                    </span>
                  </>
                ) : (
                  <h2 className="active-convo-title">请从左侧选择一个归档对话</h2>
                )}
              </div>
              
              <div className="header-actions">
                {/* 全局搜索触发按钮 */}
                <button
                  className="clear-filter-btn"
                  style={{marginTop: 0, padding: '8px 16px', display: 'flex'}}
                  onClick={() => setIsGlobalSearching(!isGlobalSearching)}
                >
                  🔎 {isGlobalSearching ? '返回对话阅读' : '超级全局搜索'}
                </button>
              </div>
            </header>

            {/* ================= 主窗口内容分流 ================= */}
            {isGlobalSearching ? (
              // 1. 全局全文搜索面板
              <div className="global-search-results">
                <div className="results-header">
                  <span className="results-title">跨对话日志全局模糊匹配</span>
                  <input
                    type="text"
                    className="search-input"
                    style={{maxWidth: '400px'}}
                    placeholder="输入检索词 (如 run_command, test...)"
                    value={globalSearchQuery}
                    onChange={(e) => setGlobalSearchQuery(e.target.value)}
                    autoFocus
                  />
                </div>
                
                <div>
                  {searchResults.length === 0 ? (
                    <div style={{textAlign: 'center', padding: '50px', color: 'var(--text-muted)'}}>
                      {globalSearchQuery ? '未找到任何匹配步骤' : '输入关键词在所有历史 logs 和工具执行返回值中搜索...'}
                    </div>
                  ) : (
                    searchResults.map((result, idx) => (
                      <div
                        key={idx}
                        className="search-result-card"
                        onClick={() => {
                          setIsGlobalSearching(false);
                          setSelectedConvoId(result.conversationId);
                          // 传递高亮的步骤索引
                          setHighlightedStepIndex(result.stepIndex);
                        }}
                      >
                        <div className="result-card-header">
                          <span className="result-card-convo-title">📖 {result.conversationTitle}</span>
                          <span>📆 {result.date} | 第 {result.stepIndex} 步</span>
                        </div>
                        <div style={{fontSize: '0.75rem', color: 'var(--text-muted)', marginBottom: '4px'}}>
                          类型: {result.type} ({result.source})
                        </div>
                        <div className="result-card-snippet">
                          {result.snippet}
                        </div>
                      </div>
                    ))
                  )}
                </div>
              </div>
            ) : selectedConvoId ? (
              // 2. 对话卡片流阅读窗口 (采用 full-width 气泡流布局)
              <div className="timeline-viewport">
                {loadingDetails ? (
                  <div className="empty-timeline-state">
                    <div className="empty-logo">⏳</div>
                    <div className="empty-title">正在流式装载日志...</div>
                    <div className="empty-desc">我们正在秒级读取和解析本地 transcript.jsonl，请稍等。</div>
                  </div>
                ) : convoDetails.length === 0 ? (
                  <div className="empty-timeline-state">
                    <div className="empty-logo">📭</div>
                    <div className="empty-title">无日志记录</div>
                    <div className="empty-desc">该对话未记录任何步骤或日志文件为空。</div>
                  </div>
                ) : (
                  convoDetails.map((step, idx) => {
                    const isUser = step.source === 'USER_EXPLICIT';
                    const isModel = step.source === 'MODEL';
                    const isSystem = step.source === 'SYSTEM';

                    let roleLabel = '系统事件';
                    let alignmentClass = 'system';
                    if (isUser) {
                      roleLabel = '您 (USER)';
                      alignmentClass = 'user';
                    } else if (isModel) {
                      roleLabel = 'Antigravity (AI)';
                      alignmentClass = 'model';
                    }

                    // 映射确定唯一的步骤 DOM 标识 ID
                    const stepId = step.step_index !== undefined ? step.step_index : idx;

                    return (
                      <div key={idx} className={`timeline-step ${alignmentClass}`}>
                        <div id={`step-card-${stepId}`} className="step-card">
                          <div className="step-header">
                            <span>{roleLabel}</span>
                            <span>Step {stepId}</span>
                          </div>
                          <div className="step-body">
                            {step.content && (
                              /* 智能长文可视折叠容器 */
                              <CollapsibleText>
                                <MarkdownRenderer content={step.content} theme={theme} />
                              </CollapsibleText>
                            )}
                            
                            {/* 工具调用集合 (折叠控制台抽屉) */}
                            {step.tool_calls && step.tool_calls.map((tc, tcIdx) => (
                              <ToolCallDrawer key={tcIdx} toolCall={tc} />
                            ))}
                          </div>
                        </div>
                      </div>
                    );
                  })
                )}
              </div>
            ) : (
              // 3. 空白占位看板
              <div style={{flex: 1, backgroundColor: 'var(--bg-primary)'}}>
                <div className="empty-timeline-state">
                  <div className="empty-logo">🔮</div>
                  <div className="empty-title">Antigravity 历史对话大盘</div>
                  <div className="empty-desc">
                    欢迎使用 ArchiveViewer！请在左侧点击任意过往的对话，或者通过日历格子来筛选并锁定特定日期。
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    // 挂载 React 根节点
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
